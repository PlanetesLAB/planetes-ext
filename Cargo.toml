[package]
name = "prosia-extensions"
version = "0.1.11"
edition = "2024"
description = "Useful extensions for types, arrays and other helper functions for Prosia projects."
license = "MIT"

[dependencies]
ndarray = "0.17.1"
num-complex = { version = "0.4", optional = true }
serde = { version = "1.0.228", features = ["derive"], optional = true }

[features]
default = []
complex = ["num-complex"]
serde = ["dep:serde"]
